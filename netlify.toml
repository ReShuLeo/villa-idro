# Netlify: статический экспорт Next.js. basePath пуст (сайт в корне домена pinto-sites.netlify.app).
[build]
  command = "npm run build"
  publish = "out"

[build.environment]
  NODE_VERSION = "22"
  # NEXT_PUBLIC_BASE_PATH намеренно не задан → basePath = "" (корень домена)

[[headers]]
  for = "/photos/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "/videos/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"
